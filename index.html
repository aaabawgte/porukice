<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porukice</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="theme-color" content="#ff4fc3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Porukice" />
  <link rel="stylesheet" href="frontend/css/style.css?v=4" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-badge">💌</div>
      <h1>Porukice</h1>
      <p class="subtitle"></p>

      <h2 data-auth-title>daj se ulogiraj bokte</h2>

      <form data-auth-form class="form">
        <label>
          Username
          <input name="username" autocomplete="username" required />
        </label>

        <label>
          Lozinka
          <input name="password" type="password" autocomplete="current-password" required />
        </label>

        <button type="submit" data-submit>Uđi</button>
      </form>

      <p data-message class="error" hidden></p>

      <button class="link-button" type="button" data-toggle-mode>
        Registriraj se
      </button>
    </section>
  </main>

  <script src="frontend/js/api.js?v=4"></script>
  <script src="frontend/js/auth.js?v=4"></script>
  <script src="frontend/js/login.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
