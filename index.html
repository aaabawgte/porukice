<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porukice</title>
  <link rel="stylesheet" href="frontend/css/style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="brand-badge">💌</div>
      <h1>Porukice</h1>
      <p class="subtitle"></p>

      <h2 data-auth-title>daj se ulogiraj bokte</h2>

      <form data-auth-form class="form">
        <label>
          Username
          <input name="username" autocomplete="username" required />
        </label>

        <label>
          Lozinka
          <input name="password" type="password" autocomplete="current-password" required />
        </label>

        <button type="submit" data-submit>Uđi</button>
      </form>

      <p data-message class="error" hidden></p>

      <button class="link-button" type="button" data-toggle-mode>
        Registriraj se
      </button>
    </section>
  </main>

  <script src="frontend/js/api.js"></script>
  <script src="frontend/js/auth.js"></script>
  <script src="frontend/js/login.js"></script>
</body>
</html>
