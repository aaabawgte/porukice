<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porukice — Chat</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="chat-page">
  <main class="chat-shell">
    <header class="chat-header">
      <div>
        <h1>Porukice 💌</h1>
        <p data-status>Učitavam...</p>
      </div>
      <button class="ghost-button" type="button" data-logout>Odjava</button>
    </header>

    <section class="messages" data-messages></section>

    <form class="message-form" data-message-form>
      <input data-message-input placeholder="napiši porukicu..." autocomplete="off" />
      <button type="submit">💌</button>
    </form>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
