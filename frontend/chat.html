<!doctype html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Porukice — Chat</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../icons/icon.svg" />
  <meta name="theme-color" content="#ff4fc3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Porukice" />
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body class="chat-page">
  <main class="chat-shell">
    <header class="chat-header">
      <div>
        <h1>Porukice 💌</h1>
        <p data-status>Učitavam...</p>
      </div>
      <button class="ghost-button" type="button" data-logout>Odjava</button>
    </header>

    <section class="messages" data-messages></section>

    <form class="message-form" data-message-form>
      <input data-message-input placeholder="napiši porukicu..." autocomplete="off" />
      <button type="submit">💌</button>
    </form>
  </main>

  <script src="js/api.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/chat.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('../service-worker.js');
      });
    }
  </script>
</body>
</html>
